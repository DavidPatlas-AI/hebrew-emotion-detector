<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck - פוליגרף רגשי ויראלי</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .logo {
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6)); }
        }

        .tagline {
            font-size: 1.1em;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .beta-badge {
            display: inline-block;
            background: var(--gradient-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
        }

        .status-card {
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .status-text {
            font-weight: 600;
            font-size: 1.1em;
        }

        .status.loading { color: var(--warning); }
        .status.ready { color: var(--success); }
        .status.error { color: var(--error); }

        .camera-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        #video {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .face-overlay {
            position: absolute;
            border: 3px solid #00f2fe;
            border-radius: 10px;
            pointer-events: none;
            animation: scanLine 2s infinite;
        }

        @keyframes scanLine {
            0%, 100% { box-shadow: 0 0 0 rgba(0, 242, 254, 0.5); }
            50% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.8); }
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--gradient-accent);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--gradient-secondary);
            grid-column: span 2;
        }

        .upload-section {
            text-align: center;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.1);
        }

        .upload-area.dragover {
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.2);
            transform: scale(1.02);
        }

        #imageInput {
            display: none;
        }

        .emotion-radar {
            position: relative;
            width: 100%;
            height: 200px;
            margin: 15px 0;
        }

        .radar-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
        }

        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            animation: radarPulse 3s ease-in-out infinite;
        }

        @keyframes radarPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .emotion-point {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #FFD700;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: emotionGlow 2s ease-in-out infinite alternate;
        }

        @keyframes emotionGlow {
            from { box-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
            to { box-shadow: 0 0 20px rgba(255, 215, 0, 1); }
        }

        .social-battery {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .battery-title {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        .battery-container {
            position: relative;
            background: #2a2a2a;
            border-radius: 25px;
            height: 50px;
            border: 2px solid #444;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .battery-fill {
            height: 100%;
            border-radius: 23px;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #DC3545 0%, #FFC107 40%, #28A745 100%);
            width: 50%;
            position: relative;
            overflow: hidden;
        }

        .battery-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .battery-emojis {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 1.5em;
            z-index: 2;
        }

        .battery-tip {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 20px;
            background: #444;
            border-radius: 0 3px 3px 0;
        }

        .mood-display {
            text-align: center;
            font-size: 1em;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 10px;
            min-height: 20px;
        }

        .analysis-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .text-area {
            width: 100%;
            min-height: 80px;
            padding: 15px;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            font-size: 1em;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            resize: vertical;
            direction: rtl;
            backdrop-filter: blur(10px);
        }

        .text-area::placeholder {
            color: var(--text-secondary);
        }

        .share-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .share-btn {
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            font-size: 1.5em;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            background: var(--gradient-accent);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 0 5px;
            }
            
            .logo {
                font-size: 2.5em;
            }
            
            #video {
                height: 240px;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .btn-primary {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="floating-particles" id="particles"></div>
    
    <div class="app-container">
        <div class="header">
            <div class="logo">VibeCheck</div>
            <div class="tagline">פוליגרף רגשי חכם</div>
            <div class="beta-badge">🚀 BETA 2025</div>
        </div>
        
        <div class="glass-card status-card">
            <div id="status" class="status loading">
                <div class="status-text">מפעיל מערכת זיהוי מתקדמת...</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceBar"></div>
                </div>
            </div>
        </div>
        
        <div class="glass-card">
            <div class="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
        </div>
        
        <div class="glass-card">
            <div class="controls">
                <button id="startBtn" class="btn btn-primary" disabled>
                    🎥 הפעל סריקה רגשית
                </button>
                <button id="captureBtn" class="btn" disabled>
                    📸 נתח עכשיו
                </button>
                <button id="continuousBtn" class="btn" disabled>
                    🔄 מצב רציף
                </button>
            </div>
        </div>

        <div class="glass-card upload-section">
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 2em; margin-bottom: 10px;">📁</div>
                <div style="font-weight: 600;">העלה תמונה לניתוח מיידי</div>
                <div style="font-size: 0.9em; margin-top: 5px; opacity: 0.8;">
                    גרור קובץ או לחץ לבחירה
                </div>
            </div>
            <input type="file" id="imageInput" accept="image/*" multiple>
        </div>

        <div class="glass-card">
            <div class="emotion-radar">
                <div class="radar-bg"></div>
                <div class="radar-center" id="currentEmoji">🤔</div>
            </div>
        </div>

        <div class="glass-card">
            <div class="analysis-panel">
                <div class="metric-card">
                    <div class="metric-value" id="dominantEmotion">--</div>
                    <div class="metric-label">רגש דומיננטי</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="confidenceLevel">--</div>
                    <div class="metric-label">רמת ביטחון</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="stressLevel">--</div>
                    <div class="metric-label">רמת לחץ</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="authenticityScore">--</div>
                    <div class="metric-label">ציון אמינות</div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="social-battery">
                <div class="battery-title">🔋 SOCIAL ENERGY LEVEL</div>
                <div class="battery-container">
                    <div class="battery-fill" id="batteryFill"></div>
                    <div class="battery-emojis">
                        <span>😩</span>
                        <span>😕</span>
                        <span>😐</span>
                        <span>🙂</span>
                        <span>😃</span>
                        <span>😄</span>
                    </div>
                    <div class="battery-tip"></div>
                </div>
                <div class="mood-display" id="moodDisplay">מחכה לניתוח...</div>
            </div>
        </div>

        <div class="glass-card">
            <textarea id="textArea" class="text-area" placeholder="הטקסט שלך יופיע כאן עם האימוג'ים המתאימים... 🎭"></textarea>
            
            <div class="share-section">
                <button class="share-btn" onclick="shareToWhatsApp()">
                    💬 WhatsApp
                </button>
                <button class="share-btn" onclick="shareToInstagram()">
                    📸 Instagram
                </button>
                <button class="share-btn" onclick="copyToClipboard()">
                    📋 העתק
                </button>
            </div>
        </div>
    </div>

    <script>
        class VibeCheckApp {
            constructor() {
                this.initializeElements();
                this.currentEmoji = '';
                this.isModelLoaded = false;
                this.isVideoStarted = false;
                this.isContinuousMode = false;
                this.analysisHistory = [];
                this.confidenceThreshold = 0.7;
                
                this.emotionMap = {
                    'happy': { 
                        emoji: '😄', 
                        batteryLevel: 90, 
                        mood: 'אנרגיה גבוהה - מוכן לחברה!',
                        stress: 10,
                        authenticity: 95,
                        color: '#28A745'
                    },
                    'surprised': { 
                        emoji: '😮', 
                        batteryLevel: 75, 
                        mood: 'מופתע וערני',
                        stress: 30,
                        authenticity: 90,
                        color: '#FFC107'
                    },
                    'neutral': { 
                        emoji: '😐', 
                        batteryLevel: 50, 
                        mood: 'רגוע ונייטרלי',
                        stress: 20,
                        authenticity: 85,
                        color: '#6C757D'
                    },
                    'sad': { 
                        emoji: '😢', 
                        batteryLevel: 25, 
                        mood: 'זקוק לתמיכה',
                        stress: 60,
                        authenticity: 88,
                        color: '#007BFF'
                    },
                    'angry': { 
                        emoji: '😠', 
                        batteryLevel: 35, 
                        mood: 'מתוח ועצבני',
                        stress: 85,
                        authenticity: 92,
                        color: '#DC3545'
                    },
                    'fearful': { 
                        emoji: '😨', 
                        batteryLevel: 15, 
                        mood: 'חרד ולחוץ',
                        stress: 90,
                        authenticity: 95,
                        color: '#6F42C1'
                    },
                    'disgusted': { 
                        emoji: '🤢', 
                        batteryLevel: 20, 
                        mood: 'לא מרוצה',
                        stress: 70,
                        authenticity: 87,
                        color: '#198754'
                    }
                };
                
                this.init();
                this.createFloatingParticles();
            }
            
            initializeElements() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.status = document.getElementById('status');
                this.currentEmojiEl = document.getElementById('currentEmoji');
                this.textArea = document.getElementById('textArea');
                this.startBtn = document.getElementById('startBtn');
                this.captureBtn = document.getElementById('captureBtn');
                this.continuousBtn = document.getElementById('continuousBtn');
                this.batteryFill = document.getElementById('batteryFill');
                this.moodDisplay = document.getElementById('moodDisplay');
                this.imageInput = document.getElementById('imageInput');
                this.uploadArea = document.getElementById('uploadArea');
                this.confidenceBar = document.getElementById('confidenceBar');
                this.dominantEmotion = document.getElementById('dominantEmotion');
                this.confidenceLevel = document.getElementById('confidenceLevel');
                this.stressLevel = document.getElementById('stressLevel');
                this.authenticityScore = document.getElementById('authenticityScore');
            }
            
            async init() {
                try {
                    await this.loadModels();
                    this.setupEventListeners();
                    this.setupDragAndDrop();
                } catch (error) {
                    this.updateStatus('שגיאה בטעינת המערכת', 'error', 0);
                }
            }
            
            async loadModels() {
                try {
                    this.updateStatus('טוען מודלי AI מתקדמים...', 'loading', 20);
                    
                    await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/weights/');
                    this.updateStatus('מודל זיהוי פנים נטען...', 'loading', 50);
                    
                    await faceapi.nets.faceExpressionNet.loadFromUri('https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/weights/');
                    this.updateStatus('מודל זיהוי רגשות נטען...', 'loading', 80);
                    
                    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/weights/');
                    
                    this.isModelLoaded = true;
                    this.updateStatus('מערכת מוכנה לשימוש! 🚀', 'ready', 100);
                    this.startBtn.disabled = false;
                } catch (error) {
                    throw new Error('Failed to load AI models');
                }
            }
            
            setupEventListeners() {
                this.startBtn.addEventListener('click', () => this.startCamera());
                this.captureBtn.addEventListener('click', () => this.captureAndAnalyze());
                this.continuousBtn.addEventListener('click', () => this.toggleContinuousMode());
                this.imageInput.addEventListener('change', (e) => this.handleImageUpload(e));
                this.uploadArea.addEventListener('click', () => this.imageInput.click());
            }
            
            setupDragAndDrop() {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    this.uploadArea.addEventListener(eventName, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                    });
                });
                
                ['dragenter', 'dragover'].forEach(eventName => {
                    this.uploadArea.addEventListener(eventName, () => {
                        this.uploadArea.classList.add('dragover');
                    });
                });
                
                ['dragleave', 'drop'].forEach(eventName => {
                    this.uploadArea.addEventListener(eventName, () => {
                        this.uploadArea.classList.remove('dragover');
                    });
                });
                
                this.uploadArea.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        this.processImageFile(files[0]);
                    }
                });
            }
            
            updateStatus(message, type, confidence = 0) {
                const statusText = this.status.querySelector('.status-text');
                statusText.textContent = message;
                this.status.className = `status ${type}`;
                this.confidenceBar.style.width = confidence + '%';
            }
            
            createFloatingParticles() {
                const particles = document.getElementById('particles');
                const emojis = ['🎭', '😊', '🤖', '✨', '🎨', '💫', '🌟', '🔮'];
                
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.textContent = emojis[i];
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particles.appendChild(particle);
                }
            }
            
            async startCamera() {
                try {
                    this.updateStatus('מפעיל מצלמה...', 'loading', 30);
                    
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            width: { ideal: 640 }, 
                            height: { ideal: 480 },
                            facingMode: 'user'
                        }
                    });
                    
                    this.video.srcObject = stream;
                    
                    this.video.addEventListener('loadedmetadata', () => {
                        this.canvas.width = this.video.videoWidth;
                        this.canvas.height = this.video.videoHeight;
                        this.isVideoStarted = true;
                        this.captureBtn.disabled = false;
                        this.continuousBtn.disabled = false;
                        this.updateStatus('מצלמה פעילה - מוכן לניתוח! 📹', 'ready', 100);
                        this.startBtn.textContent = '✅ מצלמה פעילה';
                        this.startBtn.disabled = true;
                    });
                } catch (error) {
